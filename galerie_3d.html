<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Galerie 3D</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; overflow:hidden; cursor:grab; }
  body.dragging { cursor:grabbing; }

  #hint {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.3); font:11px/1 -apple-system,sans-serif;
    letter-spacing:.08em; text-transform:uppercase; pointer-events:none;
    transition: opacity 0.5s;
  }

  #mode-btn {
    position:fixed; top:16px; right:20px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    color:rgba(255,255,255,0.6);
    font:11px/1 -apple-system,sans-serif;
    letter-spacing:.08em; text-transform:uppercase;
    padding:8px 14px; border-radius:20px;
    cursor:pointer; transition:background 0.2s;
  }
  #mode-btn:hover { background:rgba(255,255,255,0.15); }

  #auto-btn {
    position:fixed; top:16px; right:130px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    color:rgba(255,255,255,0.6);
    font:11px/1 -apple-system,sans-serif;
    letter-spacing:.08em; text-transform:uppercase;
    padding:8px 14px; border-radius:20px;
    cursor:pointer; transition:background 0.2s;
  }
  #auto-btn:hover  { background:rgba(255,255,255,0.15); }
  #auto-btn.active { background:rgba(255,255,255,0.22); color:#fff; }
</style>

<div id="hint">Glisser pour regarder · Molette pour avancer/reculer</div>
<button id="auto-btn">⟳ Rotation auto</button>
<button id="mode-btn">Vue extérieure</button>

const loader   = new THREE.TextureLoader();
const maxAniso = renderer.capabilities.getMaxAnisotropy();
const GOLDEN   = Math.PI * (3 - Math.sqrt(5));

photos.forEach((data, i) => {
  const tex = loader.load(data.url);
  tex.anisotropy      = maxAniso;
  tex.minFilter       = THREE.LinearMipmapLinearFilter;
  tex.magFilter       = THREE.LinearFilter;
  tex.generateMipmaps = true;
  tex.colorSpace      = THREE.SRGBColorSpace;

  const mat  = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
  const geo  = new THREE.PlaneGeometry(TAILLE * data.ratio, TAILLE);
  const mesh = new THREE.Mesh(geo, mat);

  const phi   = Math.acos(1 - (2 * (i + 0.5)) / photos.length);
  const theta = GOLDEN * i;
  mesh.position.set(
    RAYON * Math.sin(phi) * Math.cos(theta),
    RAYON * Math.sin(phi) * Math.sin(theta),
    RAYON * Math.cos(phi)
  );
  mesh.lookAt(0, 0, 0);
  sphere.add(mesh);
});

// ── Deux modes : INTÉRIEUR (first-person) / EXTÉRIEUR (orbit) ─────────
let modeInside = true;   // on démarre à l'intérieur

// --- Mode extérieur : OrbitControls ---
const orbit = new OrbitControls(camera, renderer.domElement);
orbit.enableDamping  = true;
orbit.dampingFactor  = 0.06;
orbit.rotateSpeed    = 0.55;
orbit.zoomSpeed      = 1.0;
orbit.minDistance    = 1;
orbit.maxDistance    = OUTSIDE * 3;
orbit.target.set(0, 0, 0);
orbit.enabled        = false;   // désactivé au départ (mode intérieur)

// --- Mode intérieur : contrôles FPS custom ---
let yaw = 0, pitch = 0;
let yawVel = 0, pitchVel = 0, moveVel = 0;
const DAMPING    = 0.88;
const ROT_SPEED  = 0.003;
const MOVE_SPEED = 0.8;

let isDragging = false, lastX = 0, lastY = 0;

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
  document.body.classList.add('dragging');
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  document.body.classList.remove('dragging');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  if (modeInside) {
    yawVel   -= dx * ROT_SPEED;
    pitchVel -= dy * ROT_SPEED;
  }
});

// Touch
let lastTX = 0, lastTY = 0;
renderer.domElement.addEventListener('touchstart', e => {
  lastTX = e.touches[0].clientX; lastTY = e.touches[0].clientY;
});
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  const dx = e.touches[0].clientX - lastTX;
  const dy = e.touches[0].clientY - lastTY;
  lastTX = e.touches[0].clientX; lastTY = e.touches[0].clientY;
  if (modeInside) { yawVel -= dx * ROT_SPEED; pitchVel -= dy * ROT_SPEED; }
}, { passive: false });

// Molette : avance/recule en mode intérieur, zoom en mode extérieur (géré par orbit)
renderer.domElement.addEventListener('wheel', e => {
  if (!modeInside) return;
  e.preventDefault();
  moveVel -= e.deltaY * 0.01 * MOVE_SPEED;
}, { passive: false });

// ── Rotation automatique de la sphère ────────────────────────────────
let autoRotate    = false;
const AUTO_SPEED  = 0.0008;   // radians/frame — ajuste ici la vitesse

const autoBtn = document.getElementById('auto-btn');
autoBtn.addEventListener('click', () => {
  autoRotate = !autoRotate;
  autoBtn.classList.toggle('active', autoRotate);
});

// ── Bouton switch de mode ─────────────────────────────────────────────
const modeBtn = document.getElementById('mode-btn');
const hint    = document.getElementById('hint');

function switchMode() {
  modeInside = !modeInside;

  if (modeInside) {
    // → intérieur
    orbit.enabled = false;
    camera.position.set(0, 0, 0.1);
    yaw = pitch = yawVel = pitchVel = moveVel = 0;
    camera.quaternion.identity();
    modeBtn.textContent  = 'Vue extérieure';
    hint.textContent     = 'Glisser pour regarder · Molette pour avancer/reculer';
  } else {
    // → extérieur
    orbit.enabled = true;
    camera.position.set(0, 0, OUTSIDE);
    orbit.target.set(0, 0, 0);
    orbit.update();
    modeBtn.textContent  = 'Vue intérieure';
    hint.textContent     = 'Glisser pour orbiter · Molette pour zoomer';
  }
}

modeBtn.addEventListener('click', switchMode);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Boucle ────────────────────────────────────────────────────────────
const fwd = new THREE.Vector3();

(function loop() {
  requestAnimationFrame(loop);

  // Rotation auto de la sphère (tourne le groupe, pas la caméra)
  if (autoRotate) {
    sphere.rotation.y += AUTO_SPEED;
  }

  if (modeInside) {
    // FPS : rotation du regard
    yaw   += yawVel;
    pitch += pitchVel;
    pitch  = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, pitch));
    yawVel   *= DAMPING;
    pitchVel *= DAMPING;

    const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw);
    const qP = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), pitch);
    camera.quaternion.copy(qY).multiply(qP);

    // Avance/recule
    if (Math.abs(moveVel) > 0.001) {
      camera.getWorldDirection(fwd);
      camera.position.addScaledVector(fwd, moveVel);
      moveVel *= DAMPING;
    }
  } else {
    orbit.update();
  }

  renderer.render(scene, camera);
})();
</script>
